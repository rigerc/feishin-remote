name: Android Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Semantic version to release, for example 1.2.0'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  release:
    name: Build signed Android release
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="${INPUT_VERSION#v}"
          fi
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "Version must be valid SemVer, such as 1.2.0 or 1.2.0-beta.1" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if [[ "$version" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Java 17
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up stable Flutter
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          channel: stable
          cache: true
          pub-cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed lib test

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          if [[ -z "$ANDROID_KEYSTORE_BASE64" ]]; then
            echo "Missing ANDROID_KEYSTORE_BASE64 secret" >&2
            exit 1
          fi
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/release.jks
          chmod 600 android/app/release.jks

      - name: Build signed release APK
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android/app/release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          for value in ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [[ -z "${!value}" ]]; then
              echo "Missing $value secret" >&2
              exit 1
            fi
          done
          flutter build apk \
            --release \
            --build-name "${{ steps.version.outputs.version }}" \
            --build-number "${GITHUB_RUN_NUMBER}" \
            --obfuscate \
            --split-debug-info="build/symbols/${{ steps.version.outputs.version }}"

      - name: Verify APK signature
        run: |
          set -euo pipefail
          apksigner="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -1)"
          if [[ -z "$apksigner" ]]; then
            echo "Android apksigner was not found" >&2
            exit 1
          fi
          "$apksigner" verify --verbose --print-certs \
            build/app/outputs/flutter-apk/app-release.apk

      - name: Package release files
        run: |
          set -euo pipefail
          mkdir -p dist
          name="feishin-remote-${{ steps.version.outputs.version }}-android.apk"
          cp build/app/outputs/flutter-apk/app-release.apk "dist/$name"
          (cd dist && sha256sum "$name" > "$name.sha256")

      - name: Upload obfuscation symbols
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: feishin-remote-symbols-${{ steps.version.outputs.version }}
          path: build/symbols/${{ steps.version.outputs.version }}
          if-no-files-found: error
          retention-days: 90

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@c12583777ecdfd3be55c69cf75464299dc01057e # v3
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Feishin Remote v${{ steps.version.outputs.version }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          prerelease: ${{ steps.version.outputs.prerelease }}
          fail_on_unmatched_files: true
          files: |
            dist/*.apk
            dist/*.sha256

      - name: Remove signing material
        if: always()
        run: rm -f android/app/release.jks
